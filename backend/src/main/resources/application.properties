spring.profiles.active=local

server.port=8080

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# File Upload Configuration (multipart limits still needed to receive files from browser)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Cloudinary Configuration (set real values as env vars on Hugging Face Spaces)
# Local test: copy .env.example -> application-local.properties and fill in your values
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder}

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expirationMs=86400000

# Mail Configuration
# Ban hay dien thong tin email cua ban vao day de gui thu nhe (nen dung Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Dien email cua ban
spring.mail.username=${SPRING_MAIL_USERNAME}
# Dien App Password cua Gmail (Khong phai mat khau dang nhap thong thuong)
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173
