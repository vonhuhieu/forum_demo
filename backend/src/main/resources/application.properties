# ===================================================================
# Active Spring Profile Configuration
# Để chuyển đổi cấu hình từ DB Local sang DB Demo của Aiven:
# 1. Điền thông tin kết nối thật vào file application-demo.properties
# 2. Bỏ dấu # ở dòng 'spring.profiles.active=demo' phía dưới
# (Hoặc chạy Java với tham số: -Dspring.profiles.active=demo)
# ===================================================================
spring.profiles.active=demo

server.port=8080

# Database Configuration (Local)
spring.datasource.url=jdbc:mysql://localhost:3306/forum_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# File Upload Configuration (multipart limits still needed to receive files from browser)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Cloudinary Configuration (set real values as env vars on Hugging Face Spaces)
# Local test: copy .env.example -> application-local.properties and fill in your values
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder}

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expirationMs=86400000

# Mail Configuration
# Ban hay dien thong tin email cua ban vao day de gui thu nhe (nen dung Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Dien email cua ban
spring.mail.username=${SPRING_MAIL_USERNAME}
# Dien App Password cua Gmail (Khong phai mat khau dang nhap thong thuong)
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173
