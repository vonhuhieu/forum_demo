server.port=8080

# ===================================================================
# Database Configuration for Aiven MySQL (Demo Environment)
# ===================================================================
# Hãy thay thế các giá trị placeholder bên dưới bằng thông tin thật từ Aiven Console:
# 1. <AIVEN_HOST>: Ví dụ mysql-forum-db-vonhuhieu2003-eccb.aivencloud.com
# 2. <AIVEN_PORT>: Ví dụ 25932
# 3. <AIVEN_DB_NAME>: Tên Database (Ví dụ defaultdb hoặc forum_db)
# 4. <AIVEN_USER>: Username đăng nhập (Ví dụ avnadmin)
# 5. <AIVEN_PASSWORD>: Password truy cập
# ===================================================================
spring.datasource.url=jdbc:mysql://mysql-forum-db-vonhuhieu2003-eccb.g.aivencloud.com:20383/defaultdb?useSSL=true&trustServerCertificate=true&serverTimezone=UTC
spring.datasource.username=avnadmin
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder}

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expirationMs=86400000

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173
