name: Deploy Backend to Hugging Face Spaces

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Clean Frontend (Avoid HF Binary Hook Block)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Create a clean orphan branch to wipe out history containing binary files
          git checkout --orphan hf-deploy
          
          # Remove frontend folder from the index
          git rm -rf frontend --ignore-unmatch
          
          # Commit the clean backend-only state
          git commit -m "deploy: clean backend build from GitHub commit ${{ github.sha }}"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://vonhuhieu:$HF_TOKEN@huggingface.co/spaces/vonhuhieu/forum_demo-backend-deploy hf-deploy:main --force
